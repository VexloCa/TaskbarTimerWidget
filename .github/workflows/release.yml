name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release tag
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -LiteralPath VERSION).Trim()
          $expectedTag = "v$version"
          $tag = "${{ github.ref_name }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = $expectedTag
          }

          if ($tag -ne $expectedTag) {
            throw "Tag '$tag' does not match VERSION ('$expectedTag')."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build, test, and package
        shell: pwsh
        run: .\build.ps1 -Package -Version "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarTimerWidget-${{ steps.version.outputs.version }}-win
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            artifacts/*.zip `
            artifacts/*.sha256 `
            --title "Taskbar Timer Widget ${{ steps.version.outputs.version }}" `
            --generate-notes
