name: Release

on:
  push:
    branches:
      - publish

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read release version
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content -Raw -LiteralPath VERSION).Trim()
          $tag = "v$version"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $exists = $false

          try {
            Invoke-RestMethod -Uri $uri -Headers $headers | Out-Null
            $exists = $true
          }
          catch {
            if ($_.Exception.Response.StatusCode.value__ -ne 404) {
              throw
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "exists=$($exists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if ($exists) {
            Write-Host "Release $tag already exists; nothing will be published."
          }

      - name: Build, test, and package
        if: steps.version.outputs.exists != 'true'
        shell: pwsh
        run: .\build.ps1 -Package -Version "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        if: steps.version.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarTimerWidget-${{ steps.version.outputs.version }}-win
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.version.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            artifacts/*.zip `
            artifacts/*.sha256 `
            --target "${{ github.sha }}" `
            --title "Taskbar Timer Widget ${{ steps.version.outputs.version }}" `
            --generate-notes
