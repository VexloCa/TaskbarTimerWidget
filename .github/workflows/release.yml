name: Release

on:
  push:
    branches:
      - publish

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read release version
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '\r\n ' < VERSION)"
          tag="v$version"

          if gh release view "$tag" >/dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "exists=$exists"
          } >> "$GITHUB_OUTPUT"

          if [[ "$exists" == "true" ]]; then
            echo "Release $tag already exists; nothing will be published."
          }

      - name: Build, test, and package
        if: steps.version.outputs.exists != 'true'
        shell: pwsh
        run: .\build.ps1 -Package -Version "${{ steps.version.outputs.version }}"

      - name: Upload workflow artifact
        if: steps.version.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarTimerWidget-${{ steps.version.outputs.version }}-win
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.version.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" `
            artifacts/*.zip `
            artifacts/*.sha256 `
            --target "${{ github.sha }}" `
            --title "Taskbar Timer Widget ${{ steps.version.outputs.version }}" `
            --generate-notes
